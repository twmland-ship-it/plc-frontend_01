# nginx 配置檔案 - plc-frontend 生產環境
# 用途：提供靜態檔案服務 + OCOGUI API 反向代理

# 注意：請根據實際路徑修改 root 路徑

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Gzip 壓縮
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json;

    server {
        listen 8345;
        server_name localhost;

        # 日誌
        access_log logs/plc-frontend-access.log;
        error_log logs/plc-frontend-error.log;

        # plc-frontend 靜態檔案
        # ⚠️ 請修改為實際路徑
        location / {
            root D:/Project/Lu-Project/Oco.Gui/release/plc-frontend/dist;
            try_files $uri $uri/ /index.html;
            index index.html;
            
            # 靜態檔案快取
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
            
            # HTML 不快取
            location ~* \.html$ {
                add_header Cache-Control "no-cache, no-store, must-revalidate";
            }
        }

        # 代理 OCOGUI API
        # /ocoguiApi/api/project → http://localhost:2955/api/project
        location /ocoguiApi/ {
            # 移除 /ocoguiApi 前綴，轉發到 OCOGUI backend
            rewrite ^/ocoguiApi/(.*)$ /$1 break;
            
            proxy_pass http://localhost:2955;
            proxy_http_version 1.1;
            
            # WebSocket 支援
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            
            # 標準代理 headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            # CORS headers（OCOGUI backend 已有，這裡加強）
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization, X-Requested-With, x-access-token, x-auth-user' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            
            # Handle preflight requests
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization, X-Requested-With, x-access-token, x-auth-user' always;
                add_header 'Access-Control-Max-Age' 86400 always;
                return 204;
            }
            
            # 超時設定
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # 代理圖片服務（imgApi）
        # ⚠️ 請修改為實際圖片服務位址
        location /imgApi/ {
            rewrite ^/imgApi/(.*)$ /$1 break;

            proxy_pass http://localhost:7654;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # 代理 plc-frontend 自己的 backend API
        # 注意：這裡假設 plc-frontend backend 在 192.168.1.152:8345
        # 如果不同，請修改
        location /api/ {
            proxy_pass http://192.168.1.152:8345;
            proxy_http_version 1.1;
            
            # WebSocket 支援
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_cache_bypass $http_upgrade;
        }

        # SignalR WebSocket 代理
        location /AlarmSummary {
            proxy_pass http://192.168.1.152:8345;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        location /Cctv {
            proxy_pass http://192.168.1.152:8345;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        location /PageTag {
            proxy_pass http://192.168.1.152:8345;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # go2rtc 反向代理（WebRTC / MSE / HLS 串流）
        # ⚠️ 請修改為實際 go2rtc 服務位址（預設 port 1984）
        location /go2rtc/ {
            rewrite ^/go2rtc/(.*)$ /$1 break;

            proxy_pass http://127.0.0.1:1984;
            proxy_http_version 1.1;

            # WebSocket 支援（MSE 使用）
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_cache_bypass $http_upgrade;

            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}
