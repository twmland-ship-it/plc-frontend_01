<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="360" viewBox="0 0 1400 360">
  <defs>
    <style>
      .font { font-family: "Microsoft JhengHei","Noto Sans CJK TC","PingFang TC","Heiti TC",Arial,sans-serif; }
      .title { font-size: 20px; font-weight: 600; fill: #111827; }
      .th { font-size: 14px; font-weight: 600; fill: #111827; }
      .td { font-size: 14px; fill: #111827; }
      .muted { font-size: 12px; fill: #6B7280; }
    </style>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1400" height="360" fill="#ffffff"/>

  <!-- card -->
  <rect x="40" y="24" width="1320" height="312" rx="8" fill="#ffffff" stroke="#E5E7EB" stroke-width="1"/>

  <!-- title (vertical center, left aligned) -->
  <!-- Header area is roughly y=24..80 (table starts at y=80), so center is y=52 -->
  <text x="64" y="52" class="font title" dominant-baseline="middle">電力卸載狀態</text>
  <text x="1060" y="60" class="font muted">（示意）hover 時整列底色醒目提示</text>

  <!-- table (no grid lines) -->
  <g transform="translate(40,80)" class="font">
    <!-- table area -->
    <rect x="0" y="0" width="1320" height="140" fill="#ffffff"/>

    <!-- header background (2 rows total height 76) -->
    <rect x="0" y="0" width="1320" height="76" fill="#D1D5DB"/>

    <!-- body background (1 row example) -->
    <rect x="0" y="76" width="1320" height="64" fill="#ffffff"/>

    <!-- hover hint overlay (no border, just light fill) -->
    <rect x="0" y="76" width="1320" height="64" fill="#FFC04D" opacity="0.18"/>
    <text x="1288" y="94" class="muted" text-anchor="end">hover 示意</text>

    <!-- Column widths rule (based on this sample row's longest text) -->
    <!-- Total width = 1320 -->
    <!-- Non-name columns (fixed by content): contract 110, demand 70, ratio 90, mode 80, stage 70, s1 90, s2 90, s3 90, action 60 => 750 -->
    <!-- Name gets remaining: 570 -->
    <!-- x positions -->
    <!-- 0 | name(570)=570 | contract 680 | demand 750 | ratio 840 | mode 920 | stage 990 | s1 1080 | s2 1170 | s3 1260 | action 1320 -->

    <!-- Header row 1 (y=0..44) - centered horizontally+vertically -->
    <text class="th" x="285" y="22" text-anchor="middle" dominant-baseline="middle">名稱 ▲</text>
    <text class="th" x="625" y="22" text-anchor="middle" dominant-baseline="middle">契約容量</text>
    <text class="th" x="715" y="22" text-anchor="middle" dominant-baseline="middle">即時需量</text>
    <text class="th" x="795" y="22" text-anchor="middle" dominant-baseline="middle">即時需量比</text>
    <text class="th" x="880" y="22" text-anchor="middle" dominant-baseline="middle">卸載模式</text>
    <text class="th" x="955" y="22" text-anchor="middle" dominant-baseline="middle">卸載階段</text>

    <!-- Stage group header spans s1..s3 (990..1260) -->
    <text class="th" x="1125" y="16" text-anchor="middle" dominant-baseline="middle">各階段需量(kW)</text>

    <!-- Action header -->
    <text class="th" x="1290" y="22" text-anchor="middle" dominant-baseline="middle">操作</text>

    <!-- Header row 2 labels for stage 1/2/3 (y=44..76) -->
    <text class="th" x="1035" y="60" text-anchor="middle" dominant-baseline="middle">1</text>
    <text class="th" x="1125" y="60" text-anchor="middle" dominant-baseline="middle">2</text>
    <text class="th" x="1215" y="60" text-anchor="middle" dominant-baseline="middle">3</text>

    <!-- Body row (y ~ 76..140) -->
    <!-- Name: left align; others follow your alignment rules -->
    <text class="td" x="16" y="108" dominant-baseline="middle">大漢營區勤務大樓電力卸載</text>

    <text class="td" x="664" y="108" text-anchor="end" dominant-baseline="middle">9,000.00</text>
    <text class="td" x="734" y="108" text-anchor="end" dominant-baseline="middle">8.25</text>
    <text class="td" x="824" y="108" text-anchor="end" dominant-baseline="middle">0.09 %</text>

    <text class="td" x="880" y="108" text-anchor="middle" dominant-baseline="middle">停用</text>
    <text class="td" x="955" y="108" text-anchor="middle" dominant-baseline="middle">0</text>

    <text class="td" x="1064" y="108" text-anchor="end" dominant-baseline="middle">1,128.00</text>
    <text class="td" x="1154" y="108" text-anchor="end" dominant-baseline="middle">1,531.00</text>
    <text class="td" x="1244" y="108" text-anchor="end" dominant-baseline="middle">1,837.00</text>

    <text class="td" x="1290" y="108" text-anchor="middle" dominant-baseline="middle">⟳</text>
  </g>
</svg>
