# Aspire / Docker：靜態 SPA + 將 API 轉發至本機 Product-002.Api（預設 5170）。
# 與專案根目錄 nginx.conf（本機絕對路徑／多組 proxy）不同，勿混用。
# Docker Desktop 使用 host.docker.internal；Linux 若無此主機名，請改為宿主 IP 或於 compose 加 extra_hosts。

server {
    listen 80;
    listen [::]:80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Vnm REST：後端 Route 為 api/v1/vnm/...，須保留完整路徑（不可剝除 /api）
    location /api/v1/ {
        proxy_pass http://host.docker.internal:5170;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # SignalR Hub（Program.cs MapHub）：須在 location / 之前，否則 try_files 會回 index.html 導致 WS 失敗
    location /AlarmSummary {
        proxy_pass http://host.docker.internal:5170;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;
    }
    location /PageTag {
        proxy_pass http://host.docker.internal:5170;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;
    }
    location /Cctv {
        proxy_pass http://host.docker.internal:5170;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;
    }

    # 必須在 location / 之前，否則 POST /api/... 會落到靜態而回 405。
    # 前端慣例為 /api/Controller/Action；後端為 [controller]/[action]（無 api 前綴）。
    # proxy_pass 結尾加 /：會自動去掉 location 前綴 /api/，例如 /api/Staff/StaffLogin → /Staff/StaffLogin
    location /api/ {
        proxy_pass http://host.docker.internal:5170/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 86400s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
